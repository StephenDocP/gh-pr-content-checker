name: Check PR content

on: [pull_request]

jobs:
  check_pr:
    runs-on: ubuntu-latest
    name: Check for forbidden string
    steps:
      - name: Scan forbidden string
        uses: StephenDocP/gh-pr-content-checker@feat/testing
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          diff-not-contain: "bad string"
          diff-not-contain-count: 2
          label-to-skip: "skip-testid-check"
